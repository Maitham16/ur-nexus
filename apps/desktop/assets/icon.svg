<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur" />
      <feOffset in="blur" dx="0" dy="16" result="offset" />
      <feComponentTransfer in="offset" result="shadow">
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- macOS Big Sur style rounded rect background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" />

  <!-- Subtle inner highlight -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" />

  <!-- Central agent glyph: a hexagonal processor / agent head with code brackets -->
  <g transform="translate(512, 500)" filter="url(#softShadow)">
    <!-- Outer hexagon -->
    <polygon points="0,-280 242,-140 242,140 0,280 -242,140 -242,-140"
              fill="none" stroke="url(#accent)" stroke-width="48" stroke-linejoin="round" />

    <!-- Inner circuitry / agent face -->
    <circle cx="0" cy="-40" r="90" fill="url(#accent)" opacity="0.18" />
    <circle cx="-70" cy="-30" r="28" fill="#ffffff" />
    <circle cx="70" cy="-30" r="28" fill="#ffffff" />
    <circle cx="-70" cy="-30" r="12" fill="#1e3a8a" />
    <circle cx="70" cy="-30" r="12" fill="#1e3a8a" />

    <!-- Smile / code prompt -->
    <path d="M -90 60 Q 0 140 90 60" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />
  </g>

  <!-- Small code brackets at bottom to emphasize coding agent -->
  <g transform="translate(512, 880)" fill="#ffffff" opacity="0.85">
    <path d="M -130 0 L -170 -40 L -130 -80 L -100 -80 L -140 -40 L -100 0 Z" />
    <path d="M 130 0 L 170 -40 L 130 -80 L 100 -80 L 140 -40 L 100 0 Z" />
  </g>
</svg>
