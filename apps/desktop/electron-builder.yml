# UR Nexus Desktop is a renamed product. Give it a distinct Launch Services
# identity so stale UR Desktop installations (which used
# com.maitham.urdesktop) cannot hide this app from Spotlight or Applications.
# User settings still migrate seamlessly because main/index.ts pins userData
# to the existing "UR Desktop" Application Support directory.
appId: com.maitham.urnexus.desktop
productName: UR Nexus Desktop
copyright: Copyright © 2026
icon: assets/icon.icns
files:
  - dist/main/main.mjs
  - dist/main/main.mjs.map
  - dist/preload/preload.cjs
  - dist/preload/preload.cjs.map
  - dist/renderer/**/*
  - package.json
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/@vscode/ripgrep*/**/*
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: '${productName}-${version}-${arch}.${ext}'
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
dmg:
  sign: false
protocols:
  - name: UR Nexus Desktop
    schemes:
      - ur-desktop
# electron-builder rebuild defaults to `npm rebuild`; override to use bun if available.
npmRebuild: false
# Copy the resolved ripgrep binary into Resources/bin (bun's symlinked store
# does not hoist the platform subpackage where electron-builder collects it).
afterPack: scripts/bundle-ripgrep.mjs
publish:
  provider: github
  owner: Maitham16
  repo: ur-nexus
