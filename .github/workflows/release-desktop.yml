name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS application
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Verify desktop source
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          bun run typecheck
          bun run lint
          bun test --timeout 120000 \
            --path-ignore-patterns='src/main/agents/backgroundAgents.test.ts'
          bun test src/main/agents/backgroundAgents.test.ts --timeout 120000

      - name: Build Intel and Apple Silicon applications
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run package:mac:release

      - name: Smoke-test native application
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          bun run smoke:mac
          bun run verify:single-instance

      - name: Create checksums
        working-directory: apps/desktop/dist
        run: shasum -a 256 *.dmg *.zip > SHA256SUMS.txt

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ur-nexus-desktop-macos-${{ github.ref_name }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/SHA256SUMS.txt
