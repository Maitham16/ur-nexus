name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS application
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Verify desktop source
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          bun run typecheck
          bun run lint
          bun test --timeout 120000 \
            --path-ignore-patterns='src/main/agents/backgroundAgents.test.ts'
          bun test src/main/agents/backgroundAgents.test.ts --timeout 120000

      - name: Configure optional Apple signing
        env:
          RELEASE_MACOS_SIGNING_ENABLED: ${{ vars.ENABLE_MACOS_SIGNING }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          RELEASE_APPLE_ID: ${{ secrets.APPLE_ID }}
          RELEASE_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          RELEASE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          write_env() {
            delimiter="UR_NEXUS_$(openssl rand -hex 16)"
            {
              echo "$1<<${delimiter}"
              printf '%s\n' "$2"
              echo "${delimiter}"
            } >> "${GITHUB_ENV}"
          }

          if [[ "${RELEASE_MACOS_SIGNING_ENABLED}" == "true" && -n "${MACOS_CERTIFICATE}" && -n "${MACOS_CERTIFICATE_PASSWORD}" ]]; then
            write_env CSC_LINK "${MACOS_CERTIFICATE}"
            write_env CSC_KEY_PASSWORD "${MACOS_CERTIFICATE_PASSWORD}"
            echo "Apple code signing enabled."
          elif [[ "${RELEASE_MACOS_SIGNING_ENABLED}" != "true" ]]; then
            echo "Apple code signing is disabled; building unsigned installers."
          elif [[ -n "${MACOS_CERTIFICATE}" || -n "${MACOS_CERTIFICATE_PASSWORD}" ]]; then
            echo "::warning::Incomplete macOS certificate secrets; building unsigned installers."
          else
            echo "No macOS certificate configured; building unsigned installers."
          fi

          if [[ "${RELEASE_MACOS_SIGNING_ENABLED}" == "true" && -n "${RELEASE_APPLE_ID}" && -n "${RELEASE_APPLE_APP_SPECIFIC_PASSWORD}" && -n "${RELEASE_APPLE_TEAM_ID}" ]]; then
            write_env APPLE_ID "${RELEASE_APPLE_ID}"
            write_env APPLE_APP_SPECIFIC_PASSWORD "${RELEASE_APPLE_APP_SPECIFIC_PASSWORD}"
            write_env APPLE_TEAM_ID "${RELEASE_APPLE_TEAM_ID}"
            echo "Apple notarization enabled."
          elif [[ "${RELEASE_MACOS_SIGNING_ENABLED}" != "true" ]]; then
            echo "Apple notarization is disabled."
          elif [[ -n "${RELEASE_APPLE_ID}" || -n "${RELEASE_APPLE_APP_SPECIFIC_PASSWORD}" || -n "${RELEASE_APPLE_TEAM_ID}" ]]; then
            echo "::warning::Incomplete Apple notarization secrets; skipping notarization."
          else
            echo "No Apple notarization credentials configured; skipping notarization."
          fi

      - name: Build Intel and Apple Silicon applications
        working-directory: apps/desktop
        run: |
          set +e
          bun run package:mac:release 2>&1 | tee native-package.log
          package_status=${PIPESTATUS[0]}
          set -e

          if [[ ${package_status} -ne 0 ]]; then
            tail -80 native-package.log > native-package-tail.log
            {
              echo '### Native packaging failure'
              echo '```text'
              cat native-package-tail.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message=$(cat native-package-tail.log)
            message=${message//'%'/'%25'}
            message=${message//$'\r'/'%0D'}
            message=${message//$'\n'/'%0A'}
            echo "::error title=Native packaging failed::${message}"
            exit "${package_status}"
          fi

      - name: Smoke-test native application
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          bun run smoke:mac
          bun run verify:single-instance

      - name: Create checksums
        working-directory: apps/desktop/dist
        run: shasum -a 256 *.dmg *.zip > SHA256SUMS.txt

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ur-nexus-desktop-macos-${{ github.ref_name }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          files=(
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/SHA256SUMS.txt
          )

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${files[@]}" --clobber
          else
            gh release create "${tag}" "${files[@]}" \
              --generate-notes \
              --title "UR Nexus Desktop ${tag#v}" \
              --verify-tag
          fi
