name: Test Production

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Environment info
        run: |
          set -x
          uname -a
          bun --version
          node --version
          npm --version
          git --version
          which git node npm bun ollama docker gh || true

      - name: Install dependencies (Bun)
        run: |
          set -xeuo pipefail
          bun install

      - name: Typecheck
        run: |
          set -xeuo pipefail
          bun run typecheck

      - name: Run tests (Bun)
        run: |
          set -xeuo pipefail
          # Bun shares process-global state across a broad discovery run. Keep
          # the core, listener, and desktop suites in isolated invocations so
          # provider env, HTTP ports, and package-install tempdirs cannot race.
          bun test --timeout 120000 \
            --path-ignore-patterns='apps/desktop/**' \
            --path-ignore-patterns='src/server.test.ts' \
            --path-ignore-patterns='test/artifactsServer.test.ts' \
            2>&1 | tee test-output.log
          bun test src/server.test.ts test/artifactsServer.test.ts \
            --timeout 120000 2>&1 | tee -a test-output.log
          cd apps/desktop
          # Background-agent tests mutate process-global runtime state and
          # environment paths by design. Bun runs discovered files in one
          # process, so isolate this file from the rest of the desktop suite.
          bun test --timeout 120000 \
            --path-ignore-patterns='src/main/agents/backgroundAgents.test.ts' \
            2>&1 | tee -a "$GITHUB_WORKSPACE/test-output.log"
          bun test src/main/agents/backgroundAgents.test.ts \
            --timeout 120000 2>&1 | tee -a "$GITHUB_WORKSPACE/test-output.log"

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-output.log
            bun.lockb
          retention-days: 7

      - name: Build bundle
        if: success()
        run: |
          set -xeuo pipefail
          bun run bundle

      - name: Build and validate desktop npm package
        if: success()
        run: |
          set -xeuo pipefail
          bun run --cwd apps/desktop typecheck
          bun run --cwd apps/desktop lint
          bun run --cwd apps/desktop build
          bun run --cwd apps/desktop package:check

      - name: Smoke test
        if: success()
        run: |
          set -xeuo pipefail
          bun run smoke

      - name: Secret scan
        if: success()
        run: |
          set -xeuo pipefail
          bun run secrets:scan

      - name: Release check
        if: success()
        run: |
          set -xeuo pipefail
          bun run release:check

      - name: Package Check
        if: success()
        run: |
          set -xeuo pipefail
          bun run package:check

      - name: Test Global Install (NPM)
        if: success()
        run: |
          set -xeuo pipefail
          npm install -g .
          ur --version

      - name: Test Desktop Global Install (NPM)
        if: success()
        run: |
          set -xeuo pipefail
          desktop_tarball="$(npm pack ./apps/desktop --ignore-scripts --pack-destination "$RUNNER_TEMP" --silent)"
          npm install -g "$RUNNER_TEMP/$desktop_tarball" --allow-scripts=node-pty
          test "$(ur-nexus-desktop --version)" = "1.0.3 (UR-Nexus Desktop)"
          global_root="$(npm root -g)"
          node -e "const {createRequire}=require('node:module'); const rq=createRequire(process.argv[1]+'/ur-nexus-desktop/package.json'); if(typeof rq('node-pty').spawn!=='function') process.exit(1)" "$global_root"
